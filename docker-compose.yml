services:

  postgres:
    image: postgres:15
    container_name: taskflow_postgres
    restart: "no"
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: taskflow_redis
    restart: "no"
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    container_name: taskflow_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"

  celery_worker:
    build: .
    container_name: taskflow_celery_worker
    command: celery -A app.background.celery_app worker -E --pool=prefork --concurrency=2 --loglevel=info 
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: "no"

  celery_beat:
    build: .
    container_name: taskflow_celery_beat
    command: celery -A app.background.celery_app beat --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: "no"

  flower:
    build: .
    container_name: taskflow_flower
    working_dir: /app
    command:  sh -c "sleep 8 && celery -A app.background.celery_app flower --broker=redis://taskflow_redis:6379/0  --port=5555" --inspect_timeout=500
    volumes:
      - .:/app
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data:



